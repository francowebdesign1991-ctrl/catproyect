<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto - Digital Cat Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Poppins', Arial, sans-serif;
    background:#fff5f0;
    overflow-x: hidden;
}

/* BOTÓN VOLVER */
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background:#F1701F;
    color:white;
    padding:12px 20px;
    border-radius:25px;
    font-weight:700;
    font-size:16px;
    text-decoration:none;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
    z-index:1000;
}
.back-btn:hover {
    background:#ff9a4d;
    transform: scale(1.05);
}

/* BANNER */
.banner {
    background: linear-gradient(-45deg, #F1701F, #FF9A4D, #FFB97B, #F1701F);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color:white;
    text-align:center;
    padding:80px 20px 50px 20px;
    border-bottom-left-radius:50px;
    border-bottom-right-radius:50px;
    min-height:200px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.banner h1 {
    font-size:48px;
    font-weight:700;
    margin:0;
}

.dynamic-text {
    margin-top:15px;
    font-size:24px;
    font-weight:600;
    min-width:260px;
    height:30px;
    line-height:30px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* fade */
.fade {
    opacity:0;
    transition: opacity 0.6s ease;
}
.fade.show {
    opacity:1;
}

/* CONTENIDO PRINCIPAL */
.main-content {
    max-width:900px;
    margin:40px auto;
    display:flex;
    flex-direction:column;
    gap:30px;
    align-items:center;
    justify-content:center;
}

/* TARJETAS */
.contact-card {
    background:white;
    width:90%;
    padding:60px 30px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
    text-align:center;
    font-size:24px;
    font-weight:700;
    transition:0.3s;
}
.contact-card:hover {
    transform: scale(1.05);
    box-shadow:0 20px 45px rgba(0,0,0,0.2);
}
.contact-card a {
    text-decoration:none;
    color:#F1701F;
}

/* RESPONSIVE */
@media(max-width:768px){
    .back-btn {font-size:14px; padding:10px 18px;}
    .banner h1 {font-size:36px;}
    .dynamic-text {font-size:20px;}
    .contact-card {font-size:20px; padding:40px 20px;}
}
</style>
</head>
<body>

<a href="index.html" class="back-btn">← Volver</a>

<div class="banner">
    <h1>📲 Contáctanos</h1>
    <div class="dynamic-text">
        <span id="dynamicText" class="fade show">Estamos aquí para ayudarte</span>
    </div>
</div>

<div class="main-content">
    <div class="contact-card">
        Instagram: <a href="https://instagram.com/TU_RED_SOCIAL" target="_blank">@TU_RED_SOCIAL</a>
    </div>
    <div class="contact-card">
        WhatsApp: <a href="https://wa.me/549XXXXXXXXXX" target="_blank">Enviar mensaje</a>
    </div>
</div>

<script>
const textos = ["Estamos aquí para ayudarte","Hablemos y consigamos clientes","Tu negocio online"];
let i = 0;
const el = document.getElementById("dynamicText");

setInterval(() => {
    el.classList.remove("show"); // fade out
    setTimeout(() => {
        i = (i + 1) % textos.length;
        el.textContent = textos[i];
        el.classList.add("show"); // fade in
    }, 600); // coincide con el transition
}, 2500);
</script>

</body>
</html>
